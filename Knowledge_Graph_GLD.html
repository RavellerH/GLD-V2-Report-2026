  {id:'dev:ch',type:'device',label:'Cluster Head',meta:'LoRa dual-channel (E22) · solar + 18650 · failover RSSI · IP66/67 · tiang 6 m.'},

  {id:'dev:bq25185',type:'hardware',label:'BQ25185',meta:'Charger + power path solar/baterai.'},

  {id:'repo:fe',type:'repo',label:'gasleakdetectionV2-April',meta:'Frontend + backend dashboard (Next.js/MapLibre/NestJS-GraphQL). Update 13 Jul 2026.'},

  {id:'ms:kickoff',type:'milestone',label:'Kick-off Pertamina',meta:'12 Jun 2026 ✓. Baseline 9 bulan, scope 6 RU.',done:true},

  {id:'ms:tcn',type:'milestone',label:'TCN LPG ≥92%',meta:'15 Jul 2026 ✓.',done:true},
  {id:'ms:funcai',type:'milestone',label:'Uji fungsional + AI',meta:'16 Jul 2026 ✓. Rantai end-to-end; inferensi AI di PC + emulator ESP32 (belum on-device).',done:true},

  {id:'ms:install',type:'milestone',label:'Field installation',meta:'Target Des 2026. Belum tercapai.',done:false},
  {id:'blk:power',type:'blocker',label:'Autonomi baterai GLD',meta:'Draw ON 5,75 W; 7P=1,76 hari vs target 30 hari. Perlu perpanjang OFF/solar.'},
  {id:'blk:tpl',type:'blocker',label:'TPL5010 belum optimal',meta:'Board ~0,4 V & cuplik data saat "off".'},
  {id:'blk:conv',type:'blocker',label:'DC converter',meta:'Perlu diganti/dimodifikasi (arahan 20 Jul).'},
  {id:'blk:lora',type:'blocker',label:'Jangkauan LoRa (disiasati mesh)',meta:'~100 m/hop vs spec 1–2 km. Disiasati mesh multi-hop 8-CH (risiko, bukan blocker keras).'},
  {id:'gate:jsa',type:'gate',label:'Gate TRA/JSA',meta:'Belum disusun → menahan eksekusi site survey fisik RU IV Cilacap.'},
  {id:'deliv:dashboard',type:'deliverable',label:'Dashboard proyek',meta:'Dashboard_GLD_ProjectManagement.html'},
  {id:'deliv:progres',type:'deliverable',label:'Laporan progres',meta:'Laporan_Progres_ByDate_GLD (HTML+MD)'},
  {id:'deliv:jsa',type:'deliverable',label:'Draft JSA/HSE',meta:'JSA_HSE_RU-IV_Cilacap_GLD (HTML+MD)'}
];
const EDGES=[
  ['org:LGU','proj:GLD','pelaksana'],['org:ITB-IoT','proj:GLD','engineering/AI'],['org:ITB-Fisika','proj:GLD','solar/energi'],['org:Pertamina','proj:GLD','klien-partner'],
  ['proj:GLD','sub:net','punya'],['proj:GLD','sub:ai','punya'],['proj:GLD','sub:power','punya'],['proj:GLD','sub:chamber','punya'],['proj:GLD','sub:sw','punya'],['proj:GLD','sub:integ','punya'],['proj:GLD','sub:ruprep','punya'],
  ['dev:node','dev:ch','LoRa STAR'],['dev:ch','dev:gw','LoRa MESH'],['dev:gw','dev:server','MQTT'],['dev:server','dev:dashboard','GraphQL'],['dev:server','dev:node','downlink'],
  ['repo:ml','dev:node','edge-ML'],['repo:srv','dev:node','firmware'],['repo:srv','dev:ch','firmware'],['repo:srv','dev:gw','firmware'],['repo:srv','dev:server','node-red'],['repo:fe','dev:dashboard','frontend'],['repo:fe','dev:server','backend'],
  ['dev:node','model:tcn','menjalankan'],['sub:power','dev:tpl5010','pakai'],['sub:power','dev:bq25185','pakai'],['sub:power','dev:tps63020','pakai'],
  ['sub:net','dev:ch','mencakup'],['sub:net','dev:gw','mencakup'],['sub:ai','dev:node','mencakup'],['sub:sw','dev:server','mencakup'],['sub:sw','dev:dashboard','mencakup'],
  ['ru:4','proj:GLD','pilot-aktif'],['ru:2','proj:GLD','roadmap'],['ru:3','proj:GLD','roadmap'],['ru:5','proj:GLD','roadmap'],['ru:6','proj:GLD','roadmap'],['ru:7','proj:GLD','roadmap'],
  ['blk:power','ms:install','menahan'],['blk:tpl','ms:install','menahan'],['blk:conv','ms:install','menahan'],['blk:lora','ms:install','menahan'],['gate:jsa','sub:ruprep','menahan'],
  ['blk:power','sub:power','bagian'],['blk:tpl','sub:power','bagian'],['blk:lora','sub:net','bagian'],
  ['ms:funcai','sub:integ','menyelesaikan'],['ms:comms','sub:integ','menyelesaikan'],['model:tcn','sub:ai','bagian'],
  ['ms:kickoff','proj:GLD','menandai'],['ms:install','ru:4','di'],
  ['deliv:dashboard','proj:GLD','melaporkan'],['deliv:progres','proj:GLD','melaporkan'],['deliv:jsa','ru:4','untuk']
];

const NById={}; NODES.forEach(n=>NById[n.id]=n);
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=Math.min(window.devicePixelRatio||1,2);
const cam={scale:1,x:0,y:0};
const hidden={};
let hover=null, selected=null, drag=null, panning=false, last={x:0,y:0}, moved=false;

// init positions in a circle-ish spread
NODES.forEach((n,i)=>{const a=i/NODES.length*Math.PI*2, r=180+((i*53)%140);
  n.x=Math.cos(a)*r; n.y=Math.sin(a)*r; n.vx=0; n.vy=0;
  n.rad=n.type==='project'?18:n.type==='subsystem'?12:n.type==='org'?12:10;});

function resize(){const r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR;}
window.addEventListener('resize',resize); resize();

// physics
let alpha=1;
function step(){
  const vis=NODES.filter(n=>!hidden[n.type]);
  for(let i=0;i<vis.length;i++)for(let j=i+1;j<vis.length;j++){
    const a=vis[i],b=vis[j]; let dx=a.x-b.x,dy=a.y-b.y; let d2=dx*dx+dy*dy||0.01; let d=Math.sqrt(d2);
    const f=2600/d2; const fx=dx/d*f, fy=dy/d*f; a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;
  }
  EDGES.forEach(e=>{const a=NById[e[0]],b=NById[e[1]]; if(hidden[a.type]||hidden[b.type])return;
    let dx=b.x-a.x,dy=b.y-a.y; let d=Math.sqrt(dx*dx+dy*dy)||0.01; const L=118; const f=(d-L)*0.032;
    const fx=dx/d*f, fy=dy/d*f; a.vx+=fx;a.vy+=fy;b.vx-=fx;b.vy-=fy;});
  vis.forEach(n=>{n.vx-=n.x*0.004; n.vy-=n.y*0.004;
    if(n===drag){n.x=n.fx;n.y=n.fy;n.vx=0;n.vy=0;return;}
    n.vx*=0.86; n.vy*=0.86; n.x+=n.vx*alpha; n.y+=n.vy*alpha;});
  if(alpha>0.05)alpha*=0.994;
}

function W2Sx(x){return x*cam.scale+cam.x} function W2Sy(y){return y*cam.scale+cam.y}
function S2Wx(x){return (x-cam.x)/cam.scale} function S2Wy(y){return (y-cam.y)/cam.scale}

function neighborsOf(id){const s=new Set(); EDGES.forEach(e=>{if(e[0]===id)s.add(e[1]); if(e[1]===id)s.add(e[0]);}); return s;}

function draw(){
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.clearRect(0,0,W,H);
  const css=getComputedStyle(document.documentElement);
  const cCanvas=css.getPropertyValue('--canvas'), cEdge=css.getPropertyValue('--edge').trim(), cEdgeHi=css.getPropertyValue('--edge-hi').trim(), cText=css.getPropertyValue('--nodetext').trim(), cPill=css.getPropertyValue('--pill').trim();
  ctx.fillStyle=cCanvas; ctx.fillRect(0,0,W,H);
  const hi = selected||hover; const hiSet = hi?neighborsOf(hi.id):null;
  // edges
  EDGES.forEach(e=>{const a=NById[e[0]],b=NById[e[1]]; if(hidden[a.type]||hidden[b.type])return;
    const on = hi && (e[0]===hi.id||e[1]===hi.id);
    ctx.beginPath(); ctx.moveTo(W2Sx(a.x),W2Sy(a.y)); ctx.lineTo(W2Sx(b.x),W2Sy(b.y));
    ctx.strokeStyle=on?cEdgeHi:cEdge; ctx.lineWidth=on?2:1; ctx.globalAlpha=hi?(on?1:0.25):0.7; ctx.stroke();
    if(on && cam.scale>0.75){ // relation label
      const mx=(W2Sx(a.x)+W2Sx(b.x))/2, my=(W2Sy(a.y)+W2Sy(b.y))/2;
      ctx.globalAlpha=1; ctx.font='9px '+css.getPropertyValue('--mono'); const t=e[2]; const tw=ctx.measureText(t).width;
      ctx.fillStyle=cPill; ctx.fillRect(mx-tw/2-4,my-7,tw+8,14); ctx.fillStyle=cEdgeHi; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(t,mx,my);
    }
  });
  ctx.globalAlpha=1;
  // nodes
  NODES.forEach(n=>{if(hidden[n.type])return;
    const sx=W2Sx(n.x),sy=W2Sy(n.y); const r=n.rad*Math.max(cam.scale,.6);
    const dim = hi && n!==hi && hiSet && !hiSet.has(n.id);
    let col=TYPES[n.type].c; if(n.type==='milestone') col=n.done?'#2E7D57':'#8A97A6';
    ctx.globalAlpha=dim?0.28:1;
    ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
    if(n===selected){ctx.lineWidth=3;ctx.strokeStyle=cEdgeHi;ctx.stroke();}
    else if(n.id==='ru:4'||n.type==='project'){ctx.lineWidth=2;ctx.strokeStyle='#fff';ctx.globalAlpha=dim?0.28:0.9;ctx.stroke();}
    // label
    if(cam.scale>0.55||n.type==='project'||n.type==='subsystem'||n===hi){
      ctx.globalAlpha=dim?0.35:1; ctx.font='600 '+(11)+'px '+css.getPropertyValue('--sans');
      const t=n.label, tw=ctx.measureText(t).width; const ly=sy+r+11;
      ctx.fillStyle=cPill; ctx.fillRect(sx-tw/2-4,ly-8,tw+8,15);
      ctx.fillStyle=cText; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(t,sx,ly);
    }
  });
  ctx.globalAlpha=1;
}
function loop(){step();draw();requestAnimationFrame(loop);}
loop();

function hitTest(sx,sy){let best=null,bd=1e9; NODES.forEach(n=>{if(hidden[n.type])return; const dx=sx-W2Sx(n.x),dy=sy-W2Sy(n.y); const r=n.rad*Math.max(cam.scale,.6)+4; const d=dx*dx+dy*dy; if(d<r*r&&d<bd){bd=d;best=n;}}); return best;}

function fit(){const vis=NODES.filter(n=>!hidden[n.type]); if(!vis.length)return;
  let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9; vis.forEach(n=>{minx=Math.min(minx,n.x);miny=Math.min(miny,n.y);maxx=Math.max(maxx,n.x);maxy=Math.max(maxy,n.y);});
  const pad=70; const sw=(maxx-minx)||1, sh=(maxy-miny)||1; const s=Math.min((W-pad*2)/sw,(H-pad*2)/sh,1.6);
  cam.scale=s; cam.x=W/2-(minx+maxx)/2*s; cam.y=H/2-(miny+maxy)/2*s;}
setTimeout(()=>{alpha=1;let k=0;const warm=setInterval(()=>{step();if(++k>120){clearInterval(warm);fit();}},4);},60);

// interactions (pointer = mouse+touch)
cv.addEventListener('pointerdown',e=>{cv.setPointerCapture(e.pointerId); const n=hitTest(e.offsetX,e.offsetY); moved=false; last={x:e.offsetX,y:e.offsetY};
  if(n){drag=n; n.fx=S2Wx(e.offsetX); n.fy=S2Wy(e.offsetY);} else {panning=true;}});
cv.addEventListener('pointermove',e=>{const dx=e.offsetX-last.x, dy=e.offsetY-last.y; if(Math.abs(dx)+Math.abs(dy)>3)moved=true;
  if(drag){drag.fx=S2Wx(e.offsetX); drag.fy=S2Wy(e.offsetY); alpha=Math.max(alpha,0.4);}
  else if(panning){cam.x+=dx; cam.y+=dy;}
  else {hover=hitTest(e.offsetX,e.offsetY); cv.style.cursor=hover?'pointer':'grab';}
  last={x:e.offsetX,y:e.offsetY};});
cv.addEventListener('pointerup',e=>{ if(drag&&!moved){select(drag);} else if(!drag&&!moved){ const n=hitTest(e.offsetX,e.offsetY); if(n)select(n); else deselect(); }
  if(drag){drag.fx=drag.fy=undefined;} drag=null; panning=false;});
cv.addEventListener('wheel',e=>{e.preventDefault(); const f=e.deltaY<0?1.12:1/1.12; zoomAt(e.offsetX,e.offsetY,f);},{passive:false});
function zoomAt(sx,sy,f){const wx=S2Wx(sx),wy=S2Wy(sy); cam.scale=Math.max(0.25,Math.min(3.5,cam.scale*f)); cam.x=sx-wx*cam.scale; cam.y=sy-wy*cam.scale;}
document.getElementById('zin').onclick=()=>zoomAt(W/2,H/2,1.2);
document.getElementById('zout').onclick=()=>zoomAt(W/2,H/2,1/1.2);
document.getElementById('fit').onclick=fit;

// selection & panel
const panel=document.getElementById('panel');
function select(n){selected=n; alpha=Math.max(alpha,0.2);
  document.getElementById('pname').textContent=n.label;
  document.getElementById('pid').textContent=n.id;
  const tp=document.getElementById('ptype'); let col=TYPES[n.type].c; if(n.type==='milestone')col=n.done?'#2E7D57':'#8A97A6';
  tp.innerHTML='<span class="dot" style="background:'+col+'"></span>'+TYPES[n.type].l; tp.style.color=col;
  document.getElementById('pmeta').textContent=n.meta||'';
  const cc=document.getElementById('pconn'); cc.innerHTML='';
  EDGES.forEach(e=>{let other,dir; if(e[0]===n.id){other=e[1];dir='→';} else if(e[1]===n.id){other=e[0];dir='←';} else return;
    const o=NById[other]; const row=document.createElement('div'); row.className='conn';
    row.innerHTML='<span class="arw">'+dir+'</span><span class="rel">'+e[2]+'</span><span>'+o.label+'</span>';
    row.onclick=()=>{select(o); centerOn(o);}; cc.appendChild(row);});
  panel.classList.add('open');}
function deselect(){selected=null; panel.classList.remove('open');}
function centerOn(n){cam.x=W/2-n.x*cam.scale; cam.y=H/2-n.y*cam.scale;}
document.getElementById('pclose').onclick=deselect;

// legend / filter
const lg=document.getElementById('legend');
Object.keys(TYPES).forEach(t=>{const c=document.createElement('span'); c.className='chip'; c.setAttribute('aria-pressed','true');
  c.innerHTML='<span class="dot" style="background:'+TYPES[t].c+'"></span>'+TYPES[t].l;
  c.onclick=()=>{hidden[t]=!hidden[t]; c.setAttribute('aria-pressed',hidden[t]?'false':'true'); alpha=Math.max(alpha,0.5); updStat();};
  lg.appendChild(c);});
function updStat(){const nv=NODES.filter(n=>!hidden[n.type]).length; const ev=EDGES.filter(e=>!hidden[NById[e[0]].type]&&!hidden[NById[e[1]].type]).length;
  document.getElementById('stat').textContent=nv+' node · '+ev+' relasi';}
updStat();

document.getElementById('theme').onclick=()=>{const cur=document.documentElement.getAttribute('data-theme'); const sd=window.matchMedia('(prefers-color-scheme:dark)').matches; const now=cur?cur:(sd?'dark':'light'); document.documentElement.setAttribute('data-theme',now==='dark'?'light':'dark');};
</script>
